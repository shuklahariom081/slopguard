[phases.install]
cmds = [
  "pip install --upgrade pip",
  "pip install torch==2.11.0+cpu torchvision --index-url https://download.pytorch.org/whl/cpu",
  "pip install fastapi uvicorn[standard] supabase transformers pillow numpy python-multipart python-dotenv pydantic httpx"
]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"